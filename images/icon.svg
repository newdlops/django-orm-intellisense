<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4b33"/>
      <stop offset="100%" style="stop-color:#072e20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44b78b"/>
      <stop offset="100%" style="stop-color:#2d9e6f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" ry="32" fill="url(#bg)"/>

  <!-- "Django" -->
  <text x="128" y="108" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="56" font-weight="900" fill="url(#accent)">Django</text>

  <!-- "ORM" -->
  <text x="128" y="162" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="4">ORM</text>

  <!-- "Intellisense" -->
  <text x="128" y="198" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="20" font-weight="600" fill="#44b78b" letter-spacing="3" opacity="0.8">Intellisense</text>
</svg>
